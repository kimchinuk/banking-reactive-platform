server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: loan-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/loans/**
          filters:
            - StripPrefix=1
        - id: customer-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/customers/**
          filters:
            - StripPrefix=1
---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: loan-service
          uri: http://loan-service:8082
          predicates:
            - Path=/api/loans/**
          filters:
            - StripPrefix=1
        - id: customer-service
          uri: http://customer-service:8081
          predicates:
            - Path=/api/customers/**
          filters:
            - StripPrefix=1
