server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - ${PAYMENT_UI_ORIGIN:http://localhost:4200}
            allowedMethods:
              - GET
              - POST
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Correlation-Id
      routes:
        - id: loan-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/loans/**
          filters:
            - StripPrefix=1
        - id: customer-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/customers/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
security:
  jwt:
    secret: your-256-bit-secret-your-256-bit-secret
    issuer: banking-reactive-platform
    expiry-seconds: 3600
logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-na}]"
