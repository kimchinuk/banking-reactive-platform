<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360">
  <rect width="1100" height="360" fill="#111827"/>
  <rect x="20" y="20" width="1060" height="320" rx="10" fill="#1f2937"/>
  <text x="40" y="60" fill="#e5e7eb" font-size="26" font-family="Arial">Swagger UI (Gateway / Loan / Customer)</text>
  <g font-family="Arial" font-size="16" fill="#d1d5db">
    <rect x="40" y="90" width="1020" height="48" rx="6" fill="#065f46"/>
    <text x="60" y="120">POST /auth/token - Issue JWT token for gateway access</text>
    <rect x="40" y="150" width="1020" height="48" rx="6" fill="#1e3a8a"/>
    <text x="60" y="180">POST /loans/apply - Submit loan request for async risk processing</text>
    <rect x="40" y="210" width="1020" height="48" rx="6" fill="#7c2d12"/>
